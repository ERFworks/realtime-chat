# docker-compose.yml
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  test_db:
    image: postgres:16
    environment:
      POSTGRES_USER: chat_test
      POSTGRES_PASSWORD: chat_test
      POSTGRES_DB: chat_test
    ports: ["5433:5432"]
    tmpfs:
        /var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  pgdata:
  minio_data:
